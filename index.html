<!DOCTYPE html>
<html>
<head>
    <title>Calculadora Completa Final</title>

    <style>
        body {
            background: #1c1c1c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calculadora {
            background: black;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #tela {
            width: 100%;
            height: 60px;
            font-size: 30px;
            text-align: right;
            margin-bottom: 15px;
            border: none;
            background: black;
            color: white;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 20px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        .numero {
            background: #333;
            color: white;
        }

        .operador {
            background: orange;
            color: white;
        }

        .igual {
            background: green;
            color: white;
        }

        .limpar {
            background: red;
            color: white;
        }

        .especial {
            background: #555;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="calculadora">

        <input type="text" id="tela" disabled>

        <div class="botoes">

            <button class="limpar" onclick="limpar()">C</button>
            <button class="especial" onclick="apagar()">←</button>
            <button class="especial" onclick="porcentagem()">%</button>
            <button class="operador" onclick="add('/')">➗</button>

            <button class="numero" onclick="add('7')">7</button>
            <button class="numero" onclick="add('8')">8</button>
            <button class="numero" onclick="add('9')">9</button>
            <button class="operador" onclick="add('*')">✖️</button>

            <button class="numero" onclick="add('4')">4</button>
            <button class="numero" onclick="add('5')">5</button>
            <button class="numero" onclick="add('6')">6</button>
            <button class="operador" onclick="add('-')">➖</button>

            <button class="numero" onclick="add('1')">1</button>
            <button class="numero" onclick="add('2')">2</button>
            <button class="numero" onclick="add('3')">3</button>
            <button class="operador" onclick="add('+')">➕</button>

            <button class="numero" onclick="add('0')">0</button>
            <button class="numero" onclick="add('.')">.</button>
            <button class="igual" onclick="calcular()">=</button>

        </div>

    </div>

    <script>
        function add(valor) {
            document.getElementById("tela").value += valor;
        }

        function limpar() {
            document.getElementById("tela").value = "";
        }

        function apagar() {
            var tela = document.getElementById("tela");
            tela.value = tela.value.slice(0, -1);
        }

        function porcentagem() {
            var tela = document.getElementById("tela");
            try {
                tela.value = eval(tela.value) / 100;
            } catch {
                tela.value = "Erro";
            }
        }

        function calcular() {
            var tela = document.getElementById("tela");

            try {
                tela.value = eval(tela.value);
            } catch {
                tela.value = "Erro";
            }
        }
    </script>

</body>
</html>
